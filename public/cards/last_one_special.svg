<svg xmlns="http://www.w3.org/2000/svg" width="400" height="560" viewBox="0 0 400 560">
  <defs>
    
      <linearGradient id="pat-grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#FF2D78;stop-opacity:0.3"/>
        <stop offset="25%" style="stop-color:#FFB800;stop-opacity:0.3"/>
        <stop offset="50%" style="stop-color:#00B4FF;stop-opacity:0.3"/>
        <stop offset="75%" style="stop-color:#00FF88;stop-opacity:0.3"/>
        <stop offset="100%" style="stop-color:#9B59B6;stop-opacity:0.3"/>
      </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="560" rx="12" fill="#0a0a0f"/>

  <!-- Pattern fill -->
  <rect x="4" y="4" width="392" height="552" rx="10" fill="url(#pat-grad)"/>

  <!-- Border -->
  <rect x="4" y="4" width="392" height="552" rx="10" fill="none" stroke="#FF2D78" stroke-width="3"/>

  <!-- Inner border -->
  <rect x="14" y="14" width="372" height="532" rx="6" fill="none" stroke="#FF2D7840" stroke-width="1"/>

  <!-- Card symbol -->
  <text x="200" y="260" text-anchor="middle" font-family="monospace" font-size="60" fill="#FF2D78" filter="url(#glow)">🎴</text>

  <!-- Label -->
  <text x="200" y="330" text-anchor="middle" font-family="monospace" font-size="24" font-weight="bold" fill="#FF2D78" filter="url(#glow)">LAST ONE</text>

  <text x="200" y="360" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#FF2D78CC">ラストワン</text>

  <!-- OripaX watermark -->
  <text x="200" y="530" text-anchor="middle" font-family="monospace" font-size="10" fill="#FF2D7840">OripaX • X Layer</text>
</svg>