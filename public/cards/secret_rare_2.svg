<svg xmlns="http://www.w3.org/2000/svg" width="400" height="560" viewBox="0 0 400 560">
  <defs>
    
      <pattern id="pat" x="0" y="0" width="40" height="60" patternUnits="userSpaceOnUse">
        <polyline points="20,0 10,25 25,25 15,60" fill="none" stroke="#FFB80030" stroke-width="2"/>
      </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="560" rx="12" fill="#2e1a00"/>

  <!-- Pattern fill -->
  <rect x="4" y="4" width="392" height="552" rx="10" fill="url(#pat)"/>

  <!-- Border -->
  <rect x="4" y="4" width="392" height="552" rx="10" fill="none" stroke="#FFB800" stroke-width="3"/>

  <!-- Inner border -->
  <rect x="14" y="14" width="372" height="532" rx="6" fill="none" stroke="#FFB80040" stroke-width="1"/>

  <!-- Card symbol -->
  <text x="200" y="260" text-anchor="middle" font-family="monospace" font-size="60" fill="#FFB800" filter="url(#glow)">🎴</text>

  <!-- Label -->
  <text x="200" y="330" text-anchor="middle" font-family="monospace" font-size="24" font-weight="bold" fill="#FFB800" filter="url(#glow)">SR-002</text>

  

  <!-- OripaX watermark -->
  <text x="200" y="530" text-anchor="middle" font-family="monospace" font-size="10" fill="#FFB80040">OripaX • X Layer</text>
</svg>